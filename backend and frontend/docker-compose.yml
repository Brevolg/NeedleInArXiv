services:
  qdrant:
    image: qdrant/qdrant:v1.18.0
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/6333"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
      - ./embeddings:/app/embeddings:ro
      - ./index:/app/index
      - model_cache:/root/.cache/huggingface
    depends_on:
      qdrant:
        condition: service_healthy

volumes:
  qdrant_storage:
  model_cache:
